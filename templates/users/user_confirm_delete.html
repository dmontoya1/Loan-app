{% extends 'base.html' %}

{% block title %}Eliminar Usuario - Sistema de Préstamos{% endblock %}

{% block content %}
<div class="px-4 py-6 max-w-2xl mx-auto">
    <div class="bg-white shadow rounded-lg p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-4">Eliminar Usuario</h1>
        <p class="text-gray-600 mb-6">¿Estás seguro de que deseas eliminar el usuario {{ object.full_name }}?</p>
        
        <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
            <p class="text-sm text-red-800">Esta acción no se puede deshacer.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="flex justify-end space-x-3">
                <a href="{% url 'users:list' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-2 rounded-lg font-medium">
                    Cancelar
                </a>
                <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-6 py-2 rounded-lg font-medium">
                    Eliminar
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
