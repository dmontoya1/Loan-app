services:
  - type: web
    name: loan-app-backend
    env: docker
    dockerfilePath: Dockerfile
    # El tier gratuito en Render para servicios web
    plan: free
    region: ohio
    # Healthcheck para que Render sepa que la app está viva
    healthCheckPath: /api/auth/login/ # Puedes cambiarlo a un endpoint más liviano si tienes uno, ej: /api/health/
    envVars:
      - key: DEBUG
        value: "False"
      # Variables clave (asegúrate de llenarlas en el Dashboard de Render o dejarlas en false/vacías si no aplican)
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "loan-app-backend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://loan-app-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://loan-app-backend.onrender.com"
      - key: DATABASE_URL
        # Render no expone esta variable en el YAML por seguridad, la debes configurar manualmente en su web.
        # Aquí la dejamos con sync: false para que te obligue a ponerla.
        sync: false

# Opcional: Si quieres que Render maneje también PostgreSQL (tiene tier gratuito que expira a los 90 días, mejor usar Supabase Cloud):
# databases:
#   - name: loan_db
#     plan: free
#     region: ohio
