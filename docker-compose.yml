services:
  db:
    image: postgres:15-alpine
    container_name: loanapp_db
    environment:
      POSTGRES_DB: ${DB_NAME:-loan_app}
      POSTGRES_USER: ${DB_USER:-daniel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-daniel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_EXTERNAL_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-daniel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loanapp_network

  web:
    build: .
    container_name: loanapp_web
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "${WEB_EXTERNAL_PORT:-8001}:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - loanapp_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  loanapp_network:
    driver: bridge
